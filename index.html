<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UnstableThoughts.blog</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: "Georgia", serif;
}

body{
    background:#f4f4f4;
    color:#1d2b2b;
    line-height:1.6;
}

/* ================= NAVBAR ================= */

header{
    width:100%;
    padding:20px 8%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    position:fixed;
    top:0;
    left:0;
    z-index:1000;
    transition:0.4s ease;

    background:rgba(255,255,255,0.2);
    backdrop-filter:blur(30px);
    -webkit-backdrop-filter:blur(30px);
    border-bottom:1px solid rgba(255,255,255,0.4);
}

header.scrolled{
    background:rgba(15,30,30,0.85);
    backdrop-filter:blur(35px);
}

header.scrolled .logo{
    color:white;
}

.logo{
    font-size:18px;
    transition:0.3s;
}



.menu-btn{
    width:45px;
    height:45px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    position:fixed;          /* Changed */
    top:11px;                /* Distance from top */
    right:30px;              /* Push to right side */
    z-index:1100;            /* Above everything */
    transition:0.4s ease;

    background:rgba(255,255,255,0.25);
    backdrop-filter:blur(20px);
    -webkit-backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,0.4);
    box-shadow:0 8px 30px rgba(0,0,0,0.1);
}

.menu-btn span{
    position:absolute;
    width:22px;
    height:1.9px;
    background:#1d2b2b;
    transition:0.4s ease;
}

.menu-btn span:nth-child(1){ transform:translateY(-6px); }
.menu-btn span:nth-child(2){ transform:translateY(6px); }

/* Animate to Cross */
.menu-btn.active span:nth-child(1){
    transform:rotate(45deg);
}

.menu-btn.active span:nth-child(2){
    transform:rotate(-45deg);
}

header.scrolled .menu-btn span{
    background:white;
}

/* ========== NAV MENU ========== */

nav ul{
    list-style:none;
    position:absolute;
    top:75px;
    right:8%;
    display:flex;
    flex-direction:column;
    gap:20px;
    padding:30px 55px;
    border-radius:24px;

    /* Glass Effect */
    background:rgba(255, 255, 255, 0.35);
    backdrop-filter:blur(55px) saturate(180%);
    -webkit-backdrop-filter:blur(55px) saturate(180%);
    border:1px solid rgba(255,255,255,0.5);
    box-shadow:0 20px 60px rgba(0,0,0,0.15);

    /* Animation Initial State */
    opacity:0;
    transform:translateY(-15px) scale(0.95);
    pointer-events:none;
    transition:
        opacity 0.35s ease,
        transform 0.35s ease;
}

/* Active Animation */
nav ul.active{
    opacity:1;
    transform:translateY(0) scale(1);
    pointer-events:auto;
}

/* Link Styling */
nav ul li a{
    text-decoration:none;
    font-size:16px;
    color:#1d2b2b;
    transition:0.3s ease;
}

/* Smooth Hover */
nav ul li a:hover{
    color:#4ca6a8;
    letter-spacing:0.5px;
}


/* ================= HERO ================= */

.hero{
    padding:170px 8% 80px 8%;
}

.hero h1{
    font-size:48px;
    max-width:800px;
    font-weight:500;
}

.hero p{
    margin-top:25px;
    font-size:20px;
    max-width:700px;
    color:#444;
}
.glass-btn {
    display: inline-block;
    margin-top: 40px;
    padding: 14px 30px;
    border-radius: 50px;
    text-decoration: none;
    font-size: 16px;
    color: #1d2b2b;
    transition: 0.4s;

    background: rgba(255,255,255,0.3);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    border: 1px solid rgba(255,255,255,0.4);
    box-shadow: 0 8px 32px rgba(0,0,0,0.1);
}

/* ================= IMAGE ================= */

.image-section{
    position:relative;
}

.image-section img{
    width:100%;
    display:block;
}

/* ===== GLASS SOCIAL BAR (BOTTOM OF IMAGE) ===== */

.social-bar{
    position:absolute;
    bottom:30px;
    left:50%;
    transform:translateX(-50%);
    padding:18px 40px;
    border-radius:60px;
    display:flex;
    gap:30px;

    background:rgba(255,255,255,0.25);
    backdrop-filter:blur(35px);
    -webkit-backdrop-filter:blur(35px);
    border:1px solid rgba(255,255,255,0.4);
    box-shadow:0 10px 40px rgba(0,0,0,0.15);
}

.social-bar a{
    text-decoration:none;
    font-size:14px;
    letter-spacing:1px;
    color:#1d2b2b;
    transition:0.3s;
}

.social-bar a:hover{
    color:#4ca6a8;
}


/* ================= RESPONSIVE ================= */

@media(max-width:768px){

    .hero h1{
        font-size:32px;
    }

    .hero p{
        font-size:18px;
    }

    .social-bar{
        gap:15px;
        padding:14px 25px;
        font-size:12px;
    }
}


</style>
</head>

<body>

<header id="navbar">
    <div class="logo">UnstableThoughts.blog</div>

    <div class="menu-btn" id="menuBtn" onclick="toggleMenu()">
        <span></span>
        <span></span>
    </div>

    <nav>
        <ul id="menu">
            <li><a href="About-Untablethoughts-and-Author">About</a></li>
            <li><a href="Unstablethoughts-Article-library">Articles</a></li>
            <li><a href="#social-bar">Contact</a></li>
        </ul>
    </nav>
</header>

<section class="hero">
    <h1>A view into Political philosophy, Indian politics, Development and social issues.</h1>
    <p>
        The goal is simple: to create a meaningful impact through honest and thoughtful writing.
    </p>
    <a href="Unstablethoughts-Article-library" class="glass-btn">Articles</a>
</section>

<section id="social-bar" class="image-section">
    <img src="unstableThoughts-image.jpg" alt="Homepage Image">

    <div  class="social-bar">
        <a href="https://www.instagram.com/abinjose_ph?igsh=YWw0M3RtMDhyODBq">Instagram</a>
        <a href="https://x.com/AbinJos_eph">Twitter</a>
        <a href="https://www.linkedin.com/in/abin-joseph-46880727a?utm_source=share_via&utm_content=profile&utm_medium=member_android">LinkedIn</a>
    </div>
</section>

<script>
function toggleMenu(){
    document.getElementById("menu").classList.toggle("active");
    document.getElementById("menuBtn").classList.toggle("active");
}

window.addEventListener("scroll",function(){
    const navbar=document.getElementById("navbar");
    if(window.scrollY>50){
        navbar.classList.add("scrolled");
    }else{
        navbar.classList.remove("scrolled");
    }
});
</script>

</body>
</html>
