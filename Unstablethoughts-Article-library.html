<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>UnstableThoughts - Article Library</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Georgia", serif;
}

body{
    background:#f4f4f4;
    color:#1d2b2b;
    line-height:1.6;
}

/* ================= GLASS HEADER (NO NAV, NO SOCIAL) ================= */

header{
    width:100%;
    padding:20px 8%;
    display:flex;
    align-items:center;
    position:fixed;
    top:0;
    left:0;
    z-index:1000;
    transition:0.4s ease;

    background:rgba(255,255,255,0.2);
    backdrop-filter:blur(30px);
    -webkit-backdrop-filter:blur(30px);
    border-bottom:1px solid rgba(255,255,255,0.4);
}

header.scrolled{
    background:rgba(15,30,30,0.85);
}

header.scrolled .logo{
    color:white;
}

.logo{
    font-size:18px;
    transition:0.3s;
}

/* ================= HERO ================= */

.hero{
    padding:100px 8% 60px 8%;
    max-width:900px;
}

.hero h1{
    font-size:48px;
    font-weight:500;
    max-width:800px;
}

.hero p{
    margin-top:20px;
    font-size:20px;
    color:#444;
    max-width:650px;
}

/* ================= ARTICLE LIST ================= */

.news-container{
    max-width:900px;
    margin:40px auto 120px auto;
    padding:0 8%;
    display:flex;
    flex-direction:column;
    gap:20px;
}

.news-card{
    display:flex;
    flex-direction:column;
    gap:10px;
    padding-bottom:30px;
    border-bottom:1px solid rgba(0,0,0,0.08);
}

.news-title{
    font-size:22px;
    font-weight:500;
    text-decoration:none;
    color:#1d2b2b;
    transition:0.3s;
}

.news-title:hover{
    color:#4ca6a8;
}

.news-meta{
    font-size:14px;
    color:#555;
}

/* ================= RESPONSIVE ================= */

@media(max-width:768px){
    .hero h1{ font-size:32px; }
    .hero p{ font-size:18px; }
    .news-title{ font-size:18px; }
}

</style>
</head>

<body>

<header id="navbar">
    <div class="logo">UnstableThoughts.com</div>
</header>

<section class="hero">
    <h1>Article Library</h1>
</section>

<div class="news-container">

<p>Coming soon</p>

</div>

<script>
window.addEventListener("scroll",function(){
    const navbar=document.getElementById("navbar");
    if(window.scrollY>50){
        navbar.classList.add("scrolled");
    }else{
        navbar.classList.remove("scrolled");
    }
});
</script>

</body>
</html>
